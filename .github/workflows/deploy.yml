# ============================================================
# NodePress — Production Deploy CI/CD Pipeline
# ============================================================
# Triggers:
#   - Push to main/master branch
#   - Manual trigger via GitHub UI (workflow_dispatch)
#
# Pipeline:
#   1. Test  — lint, typecheck, unit tests with coverage
#   2. Build — build Docker images and push to registry
#   3. Deploy — SSH to server, deploy with docker compose
# ============================================================

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_tests:
        description: 'Skip test phase'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.1.0'
  TURBO_TELEMETRY_DISABLED: 1
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'ghcr.io' }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── 1. Test ──────────────────────────────────────────────
  test:
    name: Lint & Test
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nodepress
          POSTGRES_PASSWORD: nodepress
          POSTGRES_DB: nodepress
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @nodepressjs/db exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: TypeCheck
        run: pnpm typecheck

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://nodepress:nodepress@localhost:5432/nodepress
        run: pnpm --filter @nodepressjs/db exec prisma db push --force-reset

      - name: Run tests
        run: pnpm test -- --coverage

      - name: Check coverage threshold
        run: |
          SUMMARY=$(find . -name "coverage-summary.json" -type f | head -1)
          if [ -z "$SUMMARY" ]; then
            echo "No coverage summary found — skipping threshold check"
          else
            PCT=$(jq -r '.total.lines.pct // 0' "$SUMMARY")
            echo "Total line coverage: ${PCT}%"
            if (( $(echo "$PCT < 80" | bc -l) )); then
              echo "Coverage ${PCT}% is below threshold of 80%"
              exit 1
            fi
            echo "Coverage: ${PCT}% — threshold met"
          fi

  # ── 2. Build & Push Docker Images ────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (optional)
        if: ${{ secrets.DOCKER_USERNAME }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/nodepress-api:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/nodepress-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Admin image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: admin
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/nodepress-admin:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/nodepress-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Production ──────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    if: ${{ always() && needs.build.result == 'success' }}

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://${{ secrets.APP_DOMAIN || 'nodepress.local' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            echo "=== NodePress Deploy ==="
            echo "Timestamp: $(date -u)"

            # Navigate to project directory
            cd ${{ secrets.DEPLOY_PATH || '/opt/nodepress' }}

            # Pull latest code
            echo "--- Pulling latest code ---"
            git fetch --all --quiet
            git reset --hard origin/${{ github.ref_name }}
            echo "Commit: $(git rev-parse --short HEAD)"

            # Set image tag for this deployment
            export TAG=${{ env.IMAGE_TAG }}
            export DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}

            # Pull latest images
            echo "--- Pulling images ---"
            docker compose -f docker-compose.prod.yml pull api admin

            # Start services
            echo "--- Starting services ---"
            docker compose -f docker-compose.prod.yml up -d --no-deps api admin

            # Wait for API to be healthy
            echo "--- Waiting for API health ---"
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T api curl -sf http://localhost:3001/healthz >/dev/null 2>&1; then
                echo "API is healthy"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "API health check FAILED"
                docker compose -f docker-compose.prod.yml logs --tail=20 api
                exit 1
              fi
              sleep 2
            done

            # Run database migrations
            echo "--- Running migrations ---"
            docker compose -f docker-compose.prod.yml exec -T api \
              npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma || echo "Migration warning (may be already applied)"

            # Clean up old images
            echo "--- Cleaning up ---"
            docker image prune -f --filter "until=24h"

            echo "=== Deploy Complete ==="

      - name: Health Check
        run: |
          sleep 10
          DOMAIN="${{ secrets.APP_DOMAIN }}"
          API_URL="https://api.${DOMAIN}"
          if curl -sf "${API_URL}/healthz" >/dev/null 2>&1; then
            echo "✅ API is healthy at ${API_URL}/healthz"
          else
            echo "⚠️ Could not verify health at ${API_URL}"
            echo "   (This may be expected if DNS hasn't propagated)"
          fi

      - name: Notify Slack
        if: ${{ always() && secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "NodePress Deploy ${{ job.status == 'success' && '✅' || '❌' }} to ${{ github.event.inputs.environment || 'production' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*NodePress Deploy ${{ job.status == 'success' && '✅ Succeeded' || '❌ Failed' }}*\nEnvironment: `${{ github.event.inputs.environment || 'production' }}`\nCommit: `${{ github.sha }}`\nBranch: `${{ github.ref_name }}`\nActor: ${{ github.actor }}\nURL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
